# Example: use changegen in your CI pipeline
#
# This workflow shows three common patterns:
#   1. Generate a changelog on every push to main and commit CHANGELOG.md
#   2. Post the changelog as a comment on pull requests
#   3. Use the changelog as the body of a GitHub Release on tag push

name: Changelog

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Pattern 1: Keep CHANGELOG.md up to date on every push to main ──────────
  update-changelog:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so changegen can walk tags

      - name: Generate changelog
        uses: creativengine-ai/changegen@v1
        with:
          version: Unreleased
          output-file: CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG.md [skip ci]"
          git push

  # ── Pattern 2: Post changelog as a PR comment ───────────────────────────────
  pr-changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: creativengine-ai/changegen@v1
        with:
          since: ${{ github.event.pull_request.base.sha }}
          until: ${{ github.event.pull_request.head.sha }}
          output-file: ''  # stdout only, no file write

      - name: Post changelog as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Changelog preview\n\n${process.env.CHANGELOG}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}

  # ── Pattern 3: Use changelog as GitHub Release body on tag push ─────────────
  release-changelog:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev-tag
        run: |
          PREV=$(git tag --sort=-version:refname | sed -n '2p')
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: creativengine-ai/changegen@v1
        with:
          since: ${{ steps.prev-tag.outputs.tag }}
          version: ${{ github.ref_name }}
          output-file: ''  # release body only, no file write

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: context.ref.replace('refs/tags/', ''),
              body: process.env.CHANGELOG,
              draft: false,
              prerelease: false,
            });
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
